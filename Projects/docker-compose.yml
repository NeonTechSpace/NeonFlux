name: neonflux

services:
    db:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-neonflux}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
            POSTGRES_DB: ${POSTGRES_DB:-neonflux}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
            interval: 10s
            timeout: 5s
            retries: 10

    bot:
        image: ghcr.io/neontechspace/neonflux-bot:${NEONFLUX_BOT_IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: bot
        restart: unless-stopped
        environment:
            APP_ENV: production
            NODE_ENV: production
            DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
            AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
            INSTANCE_MODE: ${INSTANCE_MODE:-multi}
            SINGLE_GUILD_ID: ${SINGLE_GUILD_ID:-}
            FLUXER_BOT_TOKEN: ${FLUXER_BOT_TOKEN:?FLUXER_BOT_TOKEN is required}
            LOG_LEVEL: ${LOG_LEVEL:-info}
            OWNER_IDS: ${OWNER_IDS:-}
        depends_on:
            db:
                condition: service_healthy

    web:
        image: ghcr.io/neontechspace/neonflux-web:${NEONFLUX_WEB_IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: web
        restart: unless-stopped
        environment:
            APP_ENV: production
            NODE_ENV: production
            DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
            AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
            INSTANCE_MODE: ${INSTANCE_MODE:-multi}
            SINGLE_GUILD_ID: ${SINGLE_GUILD_ID:-}
            FLUXER_APP_ID: ${FLUXER_APP_ID:?FLUXER_APP_ID is required}
            FLUXER_CLIENT_SECRET: ${FLUXER_CLIENT_SECRET:?FLUXER_CLIENT_SECRET is required}
            FLUXER_OAUTH_REDIRECT_URL: ${FLUXER_OAUTH_REDIRECT_URL:?FLUXER_OAUTH_REDIRECT_URL is required}
            SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
            LOG_LEVEL: ${LOG_LEVEL:-info}
            OWNER_IDS: ${OWNER_IDS:-}
            HOST: '0.0.0.0'
            PORT: '3000'
        ports:
            - '${WEB_PORT:-3000}:3000'
        depends_on:
            db:
                condition: service_healthy

volumes:
    postgres-data:
